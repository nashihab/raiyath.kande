<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Kumirer Kanna 2.7</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;overflow:hidden;font-family:Segoe UI,sans-serif;background:#001;touch-action:none}
canvas{display:block}
.panel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#022,#147,#6ad)}
.card{background:rgba(0,0,0,.65);padding:20px 24px;border-radius:16px;color:#fff;width:min(360px,88vw)}
.row{display:flex;gap:10px;margin:10px 0}
.char{flex:1;border:2px solid #777;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s;font-size:clamp(12px,3vw,14px)}
.char.sel{border-color:gold;background:rgba(255,215,0,.12)}
select,button{padding:9px;border-radius:9px;border:none;margin:4px 0;width:100%;cursor:pointer;font-size:15px}
button{background:#2a9d8f;color:#fff}
button:active{background:#1f7a6e}
#hud{position:absolute;top:8px;left:10px;color:#fff;font-weight:bold;z-index:3;text-shadow:1px 1px 3px #000;font-size:clamp(12px,3.5vw,15px);pointer-events:none}
#pause,#gameover,#menu{z-index:5}
.hidden{display:none}
.credit{font-size:10px;opacity:.45;text-align:center;margin-top:12px}
</style>
</head>
<body>

<div id="menu" class="panel">
<div class="card">
  <h2 style="text-align:center;margin:0 0 2px">🐊 Kumirer Kanna 2.7</h2>
  <p style="text-align:center;margin:0 0 12px;opacity:.6;font-size:12px">by Nahid</p>
  <div class="row">
    <div class="char sel" id="c1" onclick="selectChar('rai')">
      <div style="font-size:28px">👩</div>
      <strong>Rai</strong><br><small>Explorer</small>
    </div>
    <div class="char" id="c2" onclick="selectChar('zarin')">
      <div style="font-size:28px">👧</div>
      <strong>Zarin</strong><br><small>Adventurer</small>
    </div>
  </div>
  <select id="difficulty"><option>Easy</option><option selected>Normal</option><option>Hard</option></select>
  <label style="display:flex;align-items:center;gap:8px;margin:6px 2px;font-size:13px">
    <input type="checkbox" id="sound" checked style="width:auto"> Sound
  </label>
  <button onclick="startGame()">▶ Start Adventure</button>
  <div class="credit">© Nahid — all right cannot reserved due to limited space</div>
</div>
</div>

<div id="pause" class="panel hidden">
  <div class="card" style="text-align:center;width:min(260px,80vw)">
    <h3>⏸ Paused</h3>
    <button onclick="togglePause()">▶ Resume</button>
  </div>
</div>
<div id="gameover" class="panel hidden">
  <div class="card" style="text-align:center;width:min(280px,84vw)">
    <h3>💀 Game Over</h3>
    <div id="res" style="margin:8px 0;line-height:1.9;font-size:14px"></div>
    <button onclick="startGame()" style="background:#e76f51">↺ Restart</button>
  </div>
</div>

<div id="hud">Score: <span id="s">0</span> &nbsp;| Donuts: <span id="d">0</span></div>
<canvas id="cv"></canvas>

<script>
const canvas = document.getElementById('cv');
const ctx    = canvas.getContext('2d');

// Responsive sizing
let W, H, SEA_H, PIPE_W, CHAR_W, CHAR_H, FONT_S;
function rs(){
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  SEA_H  = Math.round(H * 0.13);   // sea zone height
  PIPE_W = Math.round(W * 0.062);  // pipe width scales with screen
  CHAR_W = Math.round(W * 0.04);   // character size
  CHAR_H = CHAR_W;
  FONT_S = Math.max(11, Math.round(W * 0.015));
}
rs(); onresize = rs;

const raiImg   = new Image(); raiImg.src   = 'rai.png';
const zarinImg = new Image(); zarinImg.src = 'zarint.png';
const donutImg = new Image(); donutImg.src = 'donut.gif';

let selected='rai', run=false, paused=false;
let b, pipes=[], coins=[], clouds=[], birds=[], islands=[];
let score=0, donuts=0, speed=0, gap=0, waveOff=0;
let spawnTimer=null;

function selectChar(n){
  selected=n;
  document.getElementById('c1').classList.toggle('sel',n==='rai');
  document.getElementById('c2').classList.toggle('sel',n==='zarin');
}

function beep(f=400,t=.08){
  if(!document.getElementById('sound').checked) return;
  try{
    let a=new(window.AudioContext||window.webkitAudioContext)(),
        o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.frequency.value=f;o.start();
    g.gain.setValueAtTime(.03,a.currentTime);
    o.stop(a.currentTime+t);
  }catch(e){}
}

function makeIsland(x){
  // Small islands — width 60-90px
  return {
    x,
    hw: 35 + Math.random()*28,   // half-width of ellipse
    variant: Math.floor(Math.random()*3), // 0=palm, 1=hut, 2=both
    lean: (Math.random()-.5)*.5,
    seed: Math.random()*99
  };
}

function rng(seed,n){ return ((Math.sin(seed+n)*43758.5453)%1+1)%1; }

function startGame(){
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('gameover').classList.add('hidden');
  score=donuts=0; waveOff=0;
  pipes=[]; coins=[]; clouds=[]; birds=[]; islands=[];

  // Char starts at ~25% from left, vertically centred in play area
  let playH = H - SEA_H;
  b={ x: W*0.2, y: playH/2, vy:0, w:CHAR_W, h:CHAR_H };

  let diff=document.getElementById('difficulty').value;
  // Speed is fraction of screen width per frame — feels consistent on all sizes
  if(diff==='Easy')   { speed=W*0.0028; gap=H*0.32; }
  if(diff==='Normal') { speed=W*0.0038; gap=H*0.29; }
  if(diff==='Hard')   { speed=W*0.0055; gap=H*0.25; }

  for(let i=0;i<6;i++)
    clouds.push({x:i*(W/5),y:30+Math.random()*(H*.18),s:.3+Math.random()*.5,sz:Math.max(14,W*.025)+Math.random()*12});
  for(let i=0;i<3;i++)
    birds.push({x:Math.random()*W,y:40+Math.random()*(H*.12),s:.5+Math.random()*.7,w:0});

  // Seed 3 islands spread across width
  for(let i=0;i<3;i++)
    islands.push(makeIsland(W*0.2 + i*(W*0.38)));

  if(spawnTimer) clearInterval(spawnTimer);
  // Spawn interval: how long it takes for a pipe to travel ~40% of screen
  let interval = Math.round((W*0.4/speed)/60*1000);
  spawnTimer = setInterval(()=>{
    if(!run||paused) return;
    let playH = H - SEA_H;
    let minTop = playH * 0.1;
    let maxTop = playH - gap - playH*0.1;
    let t = minTop + Math.random()*(maxTop - minTop);
    let n=['STA','EMIR','BLOCK'][Math.floor(Math.random()*3)];
    pipes.push({x:W, top:t, bot:t+gap, name:n, passed:false});
    coins.push({x:W+PIPE_W+20, y:t+gap/2});
  }, Math.max(1400, interval));

  run=true; paused=false;
}

function togglePause(){
  if(!run) return;
  paused=!paused;
  document.getElementById('pause').classList.toggle('hidden',!paused);
}

function flap(){
  if(run&&!paused){ b.vy = -H*0.013; beep(600); }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();flap();}
  if(e.key==='p'||e.key==='P') togglePause();
});
document.addEventListener('mousedown', flap);
document.addEventListener('touchstart',e=>{ e.preventDefault(); flap(); },{passive:false});

function die(){
  run=false;
  let hs=Math.max(score,+(localStorage.kumirer||0));
  localStorage.kumirer=hs;
  document.getElementById('res').innerHTML=
    `Score: <b>${score}</b><br>Donuts: <b>${donuts}</b><br>Best: <b>${hs}</b>`+
    (donuts>=10?'<br>🏆 Donut Lover!':'');
  document.getElementById('gameover').classList.remove('hidden');
  beep(120,.3);
}

function update(){
  if(!run||paused) return;
  waveOff+=.028;

  // Gravity scales with screen height so jump arc feels the same on all devices
  b.vy += H*0.00065;
  b.y  += b.vy;
  if(b.y<0||b.y+b.h>H-SEA_H){ die(); return; }

  clouds.forEach(c=>{ c.x-=c.s*.35; if(c.x<-c.sz*3) c.x=W+c.sz*3; });
  birds.forEach(brd=>{ brd.x-=brd.s; brd.w=(brd.w+.11)%(Math.PI*2); if(brd.x<-60) brd.x=W+60; });

  // Islands scroll AT SAME SPEED as pipes (they're in the sea zone)
  islands.forEach(isl=>{
    isl.x-=speed;
    if(isl.x+isl.hw*2<-20){
      // Respawn on right with new random layout
      let prev=islands.reduce((m,ii)=>Math.max(m,ii.x+ii.hw*2),0);
      Object.assign(isl, makeIsland(Math.max(W+20, prev+80+Math.random()*120)));
    }
  });

  pipes.forEach(p=>{
    p.x-=speed;
    if(!p.passed&&p.x+PIPE_W<b.x){ p.passed=true; score++; }
    // Collision with small margin
    if(b.x+b.w-4>p.x&&b.x+4<p.x+PIPE_W&&(b.y+4<p.top||b.y+b.h-4>p.bot)) die();
  });
  coins.forEach(c=>{
    c.x-=speed;
    if(Math.hypot((b.x+b.w/2)-c.x,(b.y+b.h/2)-c.y)<b.w*.55){ c.hit=1;score+=5;donuts++;beep(900); }
  });
  pipes=pipes.filter(p=>p.x>-PIPE_W-10);
  coins=coins.filter(c=>c.x>-50&&!c.hit);

  document.getElementById('s').textContent=score;
  document.getElementById('d').textContent=donuts;
}

// ── Drawing ──────────────────────────────────────────────────

function drawCloud(x,y,sz){
  ctx.fillStyle='rgba(255,255,255,.82)';
  ctx.beginPath();
  ctx.arc(x,      y,       sz,    0,Math.PI*2);
  ctx.arc(x+sz,   y-sz*.4, sz*.85,0,Math.PI*2);
  ctx.arc(x+sz*2, y,       sz*.75,0,Math.PI*2);
  ctx.arc(x+sz*.5,y-sz*.65,sz*.6, 0,Math.PI*2);
  ctx.fill();
}

function drawBird(x,y,wp){
  ctx.strokeStyle='#334'; ctx.lineWidth=1.5;
  let f=Math.sin(wp)*5;
  ctx.beginPath();
  ctx.moveTo(x-8,y+f); ctx.quadraticCurveTo(x,y,x+8,y+f);
  ctx.stroke();
}

function drawOneIsland(isl){
  const seaTop = H - SEA_H;
  const cx = isl.x + isl.hw;
  const cy = seaTop + SEA_H * 0.38;   // sits just above sea mid
  const hw = isl.hw;
  const hh = hw * 0.36;               // flat ellipse

  // Sand
  let sg=ctx.createRadialGradient(cx,cy-4,3,cx,cy,hw);
  sg.addColorStop(0,'#f5e07a'); sg.addColorStop(.7,'#c9922a'); sg.addColorStop(1,'#a06f18');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.ellipse(cx,cy,hw,hh,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#7a5210'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(cx,cy,hw,hh,0,0,Math.PI*2); ctx.stroke();

  // Tiny grass
  ctx.fillStyle='#3aaf52';
  ctx.beginPath(); ctx.ellipse(cx+hw*.1,cy-hh*.6,hw*.28,hh*.35,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2d8a3e';
  ctx.beginPath(); ctx.ellipse(cx+hw*.1,cy-hh*.45,hw*.18,hh*.2,0,0,Math.PI*2); ctx.fill();

  // Rocks
  for(let i=0;i<2;i++){
    let rx=cx+(rng(isl.seed,i*2)-.5)*hw*1.4;
    let ry=cy-hh*(rng(isl.seed,i*2+1)*.4+.1);
    let rr=2+rng(isl.seed,i*5)*5;
    ctx.fillStyle='#888';
    ctx.beginPath(); ctx.ellipse(rx,ry,rr,rr*.6,-.2,0,Math.PI*2); ctx.fill();
  }

  // Palm tree (small)
  if(isl.variant!==1){
    let px=cx+hw*.15, py=cy-hh*.8;
    let lean=isl.lean;
    ctx.strokeStyle='#7a4e28'; ctx.lineWidth=Math.max(2,hw*.06); ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(px,py+hh*.5);
    ctx.quadraticCurveTo(px+lean*18,py-8,px+lean*28,py-hw*.5);
    ctx.stroke();
    let tx=px+lean*28, ty=py-hw*.5;
    let fronds=[{dx:-18,dy:-8},{dx:-8,dy:-18},{dx:6,dy:-20},{dx:18,dy:-10},{dx:14,dy:2}];
    ctx.lineWidth=Math.max(1.5,hw*.04);
    fronds.forEach(f=>{
      ctx.strokeStyle='#2d7a3a';
      ctx.beginPath(); ctx.moveTo(tx,ty); ctx.quadraticCurveTo(tx+f.dx/2,ty+f.dy/2,tx+f.dx,ty+f.dy); ctx.stroke();
    });
  }

  // Tiny hut
  if(isl.variant!==0){
    let hx=cx-hw*.6, hy=cy-hh*.75;
    let hw2=hw*.35, hh2=hh*.6;
    ctx.fillStyle='#c4892a'; ctx.fillRect(hx,hy,hw2,hh2);
    ctx.fillStyle='#7a3b10';
    ctx.beginPath(); ctx.moveTo(hx-2,hy); ctx.lineTo(hx+hw2/2,hy-hh*.5); ctx.lineTo(hx+hw2+2,hy); ctx.fill();
    ctx.fillStyle='#5c3010';
    ctx.fillRect(hx+hw2*.3,hy+hh2*.5,hw2*.35,hh2*.5);
  }

  // "Hanguar Island" label — tiny, above island
  ctx.save();
  ctx.font=`bold ${Math.max(9,hw*.18)}px Georgia`;
  ctx.fillStyle='rgba(255,249,180,.85)';
  ctx.shadowColor='#5c3010'; ctx.shadowBlur=3;
  ctx.textAlign='center';
  ctx.fillText('Hanguar', cx, cy-hh-6);
  ctx.restore();
}

function drawSea(){
  const seaTop=H-SEA_H;
  let sg=ctx.createLinearGradient(0,seaTop,0,H);
  sg.addColorStop(0,'#1a72c0'); sg.addColorStop(1,'#083560');
  ctx.fillStyle=sg; ctx.fillRect(0,seaTop,W,SEA_H);

  for(let l=0;l<3;l++){
    ctx.strokeStyle=`rgba(150,220,255,${.1+l*.09})`;
    ctx.lineWidth=1.5-l*.3;
    ctx.beginPath();
    for(let x=0;x<=W;x+=7){
      let yy=seaTop+8+l*12+Math.sin((x/(26+l*8))+waveOff*(1+l*.3)+l*1.8)*(3+l*2);
      x===0?ctx.moveTo(x,yy):ctx.lineTo(x,yy);
    }
    ctx.stroke();
  }

  ctx.save();
  ctx.font=`italic bold ${Math.max(11,W*.016)}px Georgia`;
  ctx.fillStyle='rgba(200,240,255,.65)';
  ctx.shadowColor='#002'; ctx.shadowBlur=3;
  ctx.fillText('~ Taor Sea ~', W-Math.max(100,W*.14), H-8);
  ctx.restore();
}

function drawCharCanvas(x,y,w,h,isRai){
  let bodyCol=isRai?'#c0449a':'#c0392b';
  let skinCol='#f4c17a';

  // Dress / body
  ctx.fillStyle=bodyCol;
  ctx.beginPath();
  ctx.moveTo(x+w*.28,y+h*.44);
  ctx.quadraticCurveTo(x+w*.05,y+h*.78,x+w*.08,y+h);
  ctx.lineTo(x+w*.92,y+h);
  ctx.quadraticCurveTo(x+w*.95,y+h*.78,x+w*.72,y+h*.44);
  ctx.closePath(); ctx.fill();

  // Head
  ctx.fillStyle=skinCol;
  ctx.beginPath(); ctx.arc(x+w/2,y+h*.3,h*.21,0,Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle=isRai?'#1a0800':'#0d0d1a';
  ctx.beginPath(); ctx.arc(x+w/2,y+h*.18,h*.17,Math.PI,0); ctx.fill();
  ctx.fillRect(x+w*.26,y+h*.17,h*.055,h*.17);
  ctx.fillRect(x+w*.67,y+h*.17,h*.055,h*.17);
  if(isRai){ ctx.fillStyle='#ff69b4'; ctx.beginPath(); ctx.ellipse(x+w*.67,y+h*.1,5,3,.5,0,Math.PI*2); ctx.fill(); }

  // Eyes
  ctx.fillStyle='#222';
  ctx.beginPath();
  ctx.ellipse(x+w*.41,y+h*.28,2.5,3,0,0,Math.PI*2);
  ctx.ellipse(x+w*.59,y+h*.28,2.5,3,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(x+w*.42,y+h*.265,1,0,Math.PI*2);
  ctx.arc(x+w*.60,y+h*.265,1,0,Math.PI*2);
  ctx.fill();

  // Lips
  ctx.fillStyle='#e75480';
  ctx.beginPath(); ctx.ellipse(x+w/2,y+h*.345,4,2,0,0,Math.PI*2); ctx.fill();

  // Arms
  ctx.strokeStyle=bodyCol; ctx.lineWidth=Math.max(3,w*.08); ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x+w*.28,y+h*.5); ctx.lineTo(x+w*.06,y+h*.68);
  ctx.moveTo(x+w*.72,y+h*.5); ctx.lineTo(x+w*.94,y+h*.68);
  ctx.stroke();
}

function drawPipe(p){
  let pg=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
  pg.addColorStop(0,'#8b0000'); pg.addColorStop(.45,'#c0392b'); pg.addColorStop(1,'#6b0000');
  ctx.fillStyle=pg;
  ctx.fillRect(p.x,0,PIPE_W,p.top);
  ctx.fillRect(p.x,p.bot,PIPE_W,H-p.bot-SEA_H);
  // Caps
  ctx.fillStyle='#700';
  ctx.fillRect(p.x-3,p.top-Math.round(H*.022),PIPE_W+6,Math.round(H*.022));
  ctx.fillRect(p.x-3,p.bot,PIPE_W+6,Math.round(H*.022));
  // Label
  ctx.fillStyle='#fff';
  ctx.font=`bold ${FONT_S}px Segoe UI`;
  ctx.fillText(p.name,p.x+4,p.top-5);
}

function draw(){
  // Sky
  let sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#3d8fbf'); sky.addColorStop(.65,'#99d0ed'); sky.addColorStop(1,'#cceeff');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  if(!run&&!paused) return;

  clouds.forEach(c=>drawCloud(c.x,c.y,c.sz));
  birds.forEach(brd=>drawBird(brd.x,brd.y,brd.w));
  pipes.forEach(drawPipe);

  // Donuts
  coins.forEach(c=>{
    if(donutImg.complete&&donutImg.naturalWidth){
      let ds=Math.max(24,W*.03);
      ctx.drawImage(donutImg,c.x-ds/2,c.y-ds/2,ds,ds);
    } else {
      ctx.font=`${Math.max(20,W*.03)}px serif`;
      ctx.fillText('🍩',c.x-10,c.y+8);
    }
  });

  // Character
  let imgObj=selected==='rai'?raiImg:zarinImg;
  if(imgObj.complete&&imgObj.naturalWidth&&imgObj.naturalHeight){
    ctx.drawImage(imgObj,b.x,b.y,b.w,b.h);
  } else {
    drawCharCanvas(b.x,b.y,b.w,b.h,selected==='rai');
  }

  // Sea + islands on top
  drawSea();
  islands.forEach(drawOneIsland);
}

(function loop(){ update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
